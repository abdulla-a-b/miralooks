name: Auto Upload Helloproducts
on:
   push:
       branches: [main]
   pull_request:
       branches: [main]
       
  jobs:
    build-and-test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Code
          uses: actions/checkout@v4
          
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: 3.10
          
      -run: pip install requests
      
      - run: python scripts/upload.py
