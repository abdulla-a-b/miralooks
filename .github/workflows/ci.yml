name: Auto Upload Helloproducts
on:
   push:
       paths:
         - 'helloproducts/**'
       
  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
          - uses: actions/checkout@v4
          
          - uses: actions/setup-python@v4
          with:
            python-version: 3.10
          
      - run: pip install requests
      - run: python scripts/upload.py
